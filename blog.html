<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="根石将人のブログページ。技術やリサーチに関する記事を掲載。">
    <meta name="author" content="Masato NEISHI">
    <title>ブログ / Blog - 根石 将人</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nem6ishi.github.io/blog.html">
    <meta property="og:title" content="ブログ / Blog - 根石 将人">
    <meta property="og:description" content="根石将人のブログページ。技術やリサーチに関する記事を掲載。">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="https://nem6ishi.github.io/blog.html">
    <meta property="twitter:title" content="ブログ / Blog - 根石 将人">
    <meta property="twitter:description" content="根石将人のブログページ。技術やリサーチに関する記事を掲載。">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="components/loader.js"></script>
    <link rel="stylesheet" href="styles/common.css">
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col items-center min-h-screen">
    <!-- スキップリンク -->
    <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

    <!-- 固定ナビゲーションバー (JSによりcomponents/header.htmlが挿入されます) -->
    <nav id="header" class="fixed top-0 left-0 w-full bg-white shadow-sm z-50" role="navigation"
        aria-label="メインナビゲーション">
        <div class="max-w-4xl w-11/12 md:w-full mx-auto px-4 md:px-0 py-3 animate-pulse">
            <div class="h-8 bg-gray-200 rounded w-1/3 mb-2"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
        </div>
    </nav>

    <main id="main-content"
        class="max-w-4xl w-11/12 md:w-full mx-auto mt-28 mb-8 bg-white p-6 sm:p-8 rounded-xl shadow-lg">
        <nav class="text-sm mb-6 text-gray-500" aria-label="パンくずナビゲーション">
            <a href="index.html" class="hover:text-blue-600">トップ</a> &gt;
            <span>ブログ</span>
        </nav>
        <div class="mb-8 pb-2 border-b border-gray-200">
            <h1 class="text-2xl font-bold text-gray-800">ブログ / Blog</h1>
        </div>

        <section id="articles-list">
            <!-- 記事一覧がJavaScriptで動的に挿入されます -->
            <div class="text-center py-12">
                <p class="text-gray-500">記事を読み込み中...</p>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const articlesListElement = document.getElementById('articles-list');

            try {
                const response = await fetch('data/blog/articles.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                let allArticles = data.articles || [];

                // MarkdownファイルからFront Matterを取得してタイトルを上書きする
                await Promise.all(allArticles.map(async (article) => {
                    try {
                        const mdResponse = await fetch(`blog/data/${article.id}.md?t=${new Date().getTime()}`);
                        if (mdResponse.ok) {
                            const text = await mdResponse.text();
                            const frontMatterRegex = /^---\s*([\s\S]*?)\s*---/;
                            const match = text.match(frontMatterRegex);
                            if (match) {
                                const yamlText = match[1];
                                yamlText.split('\n').forEach(line => {
                                    const parts = line.split(':');
                                    if (parts.length >= 2) {
                                        const key = parts[0].trim();
                                        const value = parts.slice(1).join(':').trim();
                                        if (key === 'title') {
                                            article.title = value;
                                        }
                                    }
                                });
                            }
                        }
                    } catch (e) {
                        console.error(`Failed to load markdown for ${article.id}`, e);
                    }
                }));
                let currentSortCol = 'date';
                let currentSortDir = 'desc';

                window.toggleSort = function(col) {
                    if (currentSortCol === col) {
                        currentSortDir = currentSortDir === 'desc' ? 'asc' : 'desc';
                    } else {
                        currentSortCol = col;
                        currentSortDir = 'desc';
                    }
                    sortArticles();
                };

                function getSortIcon(col) {
                    if (currentSortCol !== col) return '<span class="text-gray-300 ml-1">↕</span>';
                    return currentSortDir === 'desc' ? '<span class="text-blue-500 ml-1">▼</span>' : '<span class="text-blue-500 ml-1">▲</span>';
                }

                function renderArticles(articles) {
                    if (articles.length > 0) {
                        const tableHeader = `
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse min-w-full">
                                    <thead>
                                        <tr class="border-b-2 border-gray-200 text-gray-500 text-sm">
                                            <th class="py-3 px-2 sm:px-4 font-medium">タイトル</th>
                                            <th class="py-3 px-2 sm:px-4 font-medium whitespace-nowrap w-24 sm:w-32 cursor-pointer hover:bg-gray-50 select-none transition-colors" onclick="toggleSort('date')" title="公開日で並び替え">
                                                公開日 ${getSortIcon('date')}
                                            </th>
                                            <th class="py-3 px-2 sm:px-4 font-medium whitespace-nowrap w-24 sm:w-32 cursor-pointer hover:bg-gray-50 select-none transition-colors" onclick="toggleSort('updatedAt')" title="更新日で並び替え">
                                                更新日 ${getSortIcon('updatedAt')}
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                        `;
                        const tableRows = articles.map(article => {
                            const dateStr = formatDateSimple(article.date);
                            const updatedStr = article.updatedAt && article.updatedAt !== article.date 
                                ? formatDateSimple(article.updatedAt) : '-';
                            
                            return `
                                        <tr class="hover:bg-gray-50 transition-colors group">
                                            <td class="py-3 px-2 sm:px-4 align-middle">
                                                <a href="blog/article.html?id=${article.id}" class="text-sm sm:text-base font-medium text-gray-800 group-hover:text-blue-600 block">
                                                    ${article.title}
                                                </a>
                                            </td>
                                            <td class="py-3 px-2 sm:px-4 text-xs sm:text-sm text-gray-500 font-mono align-middle whitespace-nowrap">
                                                <time datetime="${article.date}">${dateStr}</time>
                                            </td>
                                            <td class="py-3 px-2 sm:px-4 text-xs sm:text-sm text-gray-500 font-mono align-middle whitespace-nowrap">
                                                ${updatedStr !== '-' ? `<time datetime="${article.updatedAt}">${updatedStr}</time>` : '-'}
                                            </td>
                                        </tr>
                            `;
                        }).join('');
                        const tableFooter = `
                                    </tbody>
                                </table>
                            </div>
                        `;
                        articlesListElement.innerHTML = tableHeader + tableRows + tableFooter;
                    } else {
                        articlesListElement.innerHTML = `
                            <div class="text-center py-12">
                                <p class="text-gray-500">記事がまだありません。</p>
                            </div>
                        `;
                    }
                }

                function sortArticles() {
                    let sorted = [...allArticles];
                    sorted.sort((a, b) => {
                        let valA, valB;
                        if (currentSortCol === 'updatedAt') {
                            valA = a.updatedAt ? new Date(a.updatedAt) : new Date(a.date);
                            valB = b.updatedAt ? new Date(b.updatedAt) : new Date(b.date);
                            if (valB - valA === 0) {
                                valA = new Date(a.date);
                                valB = new Date(b.date);
                            }
                        } else {
                            valA = new Date(a.date);
                            valB = new Date(b.date);
                        }
                        
                        return currentSortDir === 'desc' ? valB - valA : valA - valB;
                    });
                    renderArticles(sorted);
                }

                if (allArticles.length > 0) {
                    sortArticles();
                } else {
                    renderArticles([]);
                }
            } catch (error) {
                console.error('記事一覧の読み込みエラー:', error);
                articlesListElement.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-red-600">記事一覧の読み込みに失敗しました。</p>
                    </div>
                `;
            }

            function formatDateSimple(dateString) {
                const date = new Date(dateString);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}.${month}.${day}`;
            }
        });
    </script>
    <!-- フッター (JSによりcomponents/footer.htmlが挿入されます) -->
    <footer id="footer"></footer>
</body>

</html>
