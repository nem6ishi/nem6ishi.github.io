<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="根石将人のブログページ。技術やリサーチに関する記事を掲載。">
    <meta name="author" content="Masato NEISHI">
    <title>ブログ / Blog - 根石 将人</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nem6ishi.github.io/blog.html">
    <meta property="og:title" content="ブログ / Blog - 根石 将人">
    <meta property="og:description" content="根石将人のブログページ。技術やリサーチに関する記事を掲載。">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="https://nem6ishi.github.io/blog.html">
    <meta property="twitter:title" content="ブログ / Blog - 根石 将人">
    <meta property="twitter:description" content="根石将人のブログページ。技術やリサーチに関する記事を掲載。">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="components/loader.js"></script>
    <link rel="stylesheet" href="styles/common.css">
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col items-center min-h-screen">
    <!-- スキップリンク -->
    <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

    <!-- 固定ナビゲーションバー (JSによりcomponents/header.htmlが挿入されます) -->
    <nav id="header" class="fixed top-0 left-0 w-full bg-white shadow-sm z-50" role="navigation"
        aria-label="メインナビゲーション">
        <div class="max-w-4xl w-11/12 md:w-full mx-auto px-4 md:px-0 py-3 animate-pulse">
            <div class="h-8 bg-gray-200 rounded w-1/3 mb-2"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
        </div>
    </nav>

    <main id="main-content"
        class="max-w-4xl w-11/12 md:w-full mx-auto mt-28 mb-8 bg-white p-6 sm:p-8 rounded-xl shadow-lg">
        <nav class="text-sm mb-6 text-gray-500" aria-label="パンくずナビゲーション">
            <a href="index.html" class="hover:text-blue-600">トップ</a> &gt;
            <span>ブログ</span>
        </nav>
        <div class="mb-8 pb-2 border-b border-gray-200 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-2">
            <h1 class="text-2xl font-bold text-gray-800">ブログ / Blog</h1>
            <div class="text-sm flex items-center">
                <label for="sort-select" class="text-gray-500 mr-2 whitespace-nowrap">並び替え:</label>
                <select id="sort-select" class="border border-gray-300 rounded text-gray-700 bg-white py-1 px-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="date-desc">初公開日 (新しい順)</option>
                    <option value="date-asc">初公開日 (古い順)</option>
                    <option value="updated-desc">最終更新日 (新しい順)</option>
                </select>
            </div>
        </div>

        <section id="articles-list">
            <!-- 記事一覧がJavaScriptで動的に挿入されます -->
            <div class="text-center py-12">
                <p class="text-gray-500">記事を読み込み中...</p>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const articlesListElement = document.getElementById('articles-list');

            try {
                const response = await fetch('data/blog/articles.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                let allArticles = data.articles || [];

                function renderArticles(articles) {
                    if (articles.length > 0) {
                        articlesListElement.innerHTML = articles.map(article => {
                            const dateStr = formatDateSimple(article.date);
                            const updatedStr = article.updatedAt && article.updatedAt !== article.date 
                                ? formatDateSimple(article.updatedAt) : '';
                            
                            const timeDisplay = updatedStr 
                                ? `<div class="flex flex-col"><time datetime="${article.date}">公開: ${dateStr}</time><time datetime="${article.updatedAt}" class="text-blue-500">更新: ${updatedStr}</time></div>`
                                : `<time datetime="${article.date}" class="my-auto">公開: ${dateStr}</time>`;

                            return `
                            <div class="py-3 border-b border-gray-100 last:border-0">
                                <a href="blog/article.html?id=${article.id}" class="flex flex-col sm:flex-row sm:items-baseline gap-2 sm:gap-4 group">
                                    <div class="text-xs sm:text-sm text-gray-400 font-mono min-w-[130px]">
                                        ${timeDisplay}
                                    </div>
                                    <span class="text-base sm:text-lg font-medium text-gray-800 group-hover:text-blue-600 transition-colors sm:self-center">
                                        ${article.title}
                                    </span>
                                </a>
                            </div>
                            `;
                        }).join('');
                    } else {
                        articlesListElement.innerHTML = `
                            <div class="text-center py-12">
                                <p class="text-gray-500">記事がまだありません。</p>
                            </div>
                        `;
                    }
                }

                function sortArticles(mode) {
                    let sorted = [...allArticles];
                    if (mode === 'date-desc') {
                        sorted.sort((a, b) => new Date(b.date) - new Date(a.date));
                    } else if (mode === 'date-asc') {
                        sorted.sort((a, b) => new Date(a.date) - new Date(b.date));
                    } else if (mode === 'updated-desc') {
                        sorted.sort((a, b) => {
                            const dateA = a.updatedAt ? new Date(a.updatedAt) : new Date(a.date);
                            const dateB = b.updatedAt ? new Date(b.updatedAt) : new Date(b.date);
                            // もし更新日が同じなら初公開日の新しい順
                            if (dateB - dateA === 0) {
                                return new Date(b.date) - new Date(a.date);
                            }
                            return dateB - dateA;
                        });
                    }
                    renderArticles(sorted);
                }

                if (allArticles.length > 0) {
                    const sortSelect = document.getElementById('sort-select');
                    if (sortSelect) {
                        sortSelect.addEventListener('change', (e) => sortArticles(e.target.value));
                        sortArticles(sortSelect.value);
                    } else {
                        sortArticles('date-desc');
                    }
                } else {
                    renderArticles([]);
                }
            } catch (error) {
                console.error('記事一覧の読み込みエラー:', error);
                articlesListElement.innerHTML = `
                    <div class="text-center py-12">
                        <p class="text-red-600">記事一覧の読み込みに失敗しました。</p>
                    </div>
                `;
            }

            function formatDateSimple(dateString) {
                const date = new Date(dateString);
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}.${month}.${day}`;
            }
        });
    </script>
    <!-- フッター (JSによりcomponents/footer.htmlが挿入されます) -->
    <footer id="footer"></footer>
</body>

</html>
