    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const sections = document.querySelectorAll('.category-section');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white', 'font-bold', 'shadow-sm', 'active');
                        b.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200', 'font-medium', 'hover:bg-gray-50');
                    });
                    btn.classList.add('bg-blue-600', 'text-white', 'font-bold', 'shadow-sm', 'active');
                    btn.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200', 'font-medium', 'hover:bg-gray-50');

                    const filter = btn.getAttribute('data-filter');

                    sections.forEach(section => {
                        if (filter === 'all' || section.getAttribute('data-category') === filter) {
                            section.style.display = 'block';
                            // small delay to let display block apply before opacity transition
                            setTimeout(() => {
                                section.style.opacity = '1';
                                section.style.transform = 'scale(1)';
                            }, 10);
                        } else {
                            section.style.opacity = '0';
                            section.style.transform = 'scale(0.95)';
                            setTimeout(() => {
                                section.style.display = 'none';
                            }, 300);
                        }
                    });
                });
            });
        });
    </script>
