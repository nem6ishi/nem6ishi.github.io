<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="根石将人のレシピ詳細ページ。">
    <meta name="author" content="Masato NEISHI">
    <title>レシピ詳細 - 根石 将人</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta id="og-url" property="og:url" content="https://nem6ishi.github.io/hobbies/recipe.html">
    <meta id="og-title" property="og:title" content="レシピ詳細 - 根石 将人">
    <meta property="og:description" content="根石将人のレシピ詳細ページ。">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta id="twitter-url" property="twitter:url" content="https://nem6ishi.github.io/hobbies/recipe.html">
    <meta id="twitter-title" property="twitter:title" content="レシピ詳細 - 根石 将人">
    <meta property="twitter:description" content="根石将人のレシピ詳細ページ。">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../components/loader.js"></script>
    <script src="../scripts/utils.js"></script>
    <script src="../scripts/recipe-detail.js"></script>
    <link rel="stylesheet" href="../styles/common.css">
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col items-center min-h-screen">
    <!-- スキップリンク -->
    <a href="#main-content" class="skip-link">メインコンテンツへスキップ</a>

    <!-- 固定ナビゲーションバー -->
    <nav class="fixed top-0 left-0 w-full bg-white shadow-sm z-50" role="navigation" aria-label="メインナビゲーション">
        <div class="max-w-4xl w-11/12 md:w-full mx-auto px-4 md:px-0 py-3">
            <div class="flex items-center justify-start mb-2">
                <h1 class="text-xl sm:text-2xl font-bold text-gray-800 whitespace-nowrap mr-4">根石 将人 / Masato NEISHI
                </h1>
                <img src="../images/profile.jpg" alt="プロフィール画像"
                    class="w-8 h-8 rounded-full object-cover border-2 border-blue-500 flex-shrink-0">
            </div>
            <div class="flex space-x-6 justify-start">
                <a href="../index.html"
                    class="nav-link text-gray-600 hover:text-blue-600 font-medium text-base rounded-md px-3 py-2">プロフィール</a>
                <a href="../hobbies.html"
                    class="nav-link active text-gray-600 font-medium text-base rounded-md px-3 py-2">趣味</a>
                <a href="../blog.html"
                    class="nav-link text-gray-600 hover:text-blue-600 font-medium text-base rounded-md px-3 py-2">ブログ</a>
            </div>
        </div>
    </nav>

    <main id="main-content"
        class="max-w-4xl w-11/12 md:w-full mx-auto mt-28 mb-8 bg-white p-6 sm:p-8 rounded-xl shadow-lg">
        <nav class="text-sm mb-6 text-gray-500" aria-label="パンくずナビゲーション">
            <a href="../index.html" class="hover:text-blue-600">トップ</a> &gt;
            <a href="../hobbies.html" class="hover:text-blue-600">趣味</a> &gt;
            <a id="nav-category" href="#" class="hover:text-blue-600">レシピ</a> &gt;
            <span id="nav-current-title">詳細</span>
        </nav>

        <div id="loading-spinner" class="py-12 flex justify-center items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <div id="recipe-content" class="hidden">
            <div class="mb-8 pb-4 border-b border-gray-200">
                <div class="flex flex-wrap gap-2 mb-3" id="recipe-tags">
                    <!-- タグが動的に挿入されます -->
                </div>
                <h1 id="recipe-title" class="text-3xl font-bold text-gray-900 mb-2"></h1>
                <p id="recipe-date" class="text-sm text-gray-500 font-normal mb-4"></p>
                <p id="recipe-description" class="text-base text-gray-700 leading-relaxed"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- 材料セクション -->
                <div class="md:col-span-1">
                    <div class="bg-orange-50 p-6 rounded-xl h-full">
                        <h2 class="text-xl font-bold text-orange-800 mb-4 flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            材料
                        </h2>
                        <ul id="recipe-ingredients" class="space-y-3 text-sm text-gray-800">
                            <!-- 材料が動的に挿入されます -->
                        </ul>
                    </div>
                </div>

                <!-- 作り方セクション -->
                <div class="md:col-span-2">
                    <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        作り方
                    </h2>
                    <div id="recipe-instructions" class="space-y-6">
                        <!-- 作り方が動的に挿入されます -->
                    </div>
                </div>
            </div>
        </div>

        <div id="error-message" class="hidden py-8">
            <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md shadow-sm">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">レシピが見つかりませんでした。</h3>
                        <div class="mt-2 text-sm text-red-700">
                            <p>指定されたレシピデータが存在しないか、読み込みに失敗しました。</p>
                        </div>
                        <div class="mt-4">
                            <a href="../hobbies.html" class="text-sm font-medium text-red-800 hover:text-red-700 underline">趣味ページへ戻る</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- フッター (JSによりcomponents/footer.htmlが挿入されるよう、プレースホルダーを追加) -->
    <footer id="footer"></footer>
</body>

</html>
